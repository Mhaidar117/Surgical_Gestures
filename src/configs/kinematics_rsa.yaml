# Kinematics-RSA config: per-sample stimulus-locked RSA between ViT video
# embeddings and the corresponding kinematic trajectories. Same RSA machinery
# as brain_eye/bridge, but the target comes from kinematics of the same gesture
# segment the model is processing. No cross-dataset transfer, no bottleneck —
# this is the principled version of what the EEG bridge was trying to do.
#
# Use with: --task all --split fold_1 --split_family louo
model_name: vit_small_patch16_224
pretrained: true
freeze_until: 6
use_adapters: true
use_flow: false

# Training
batch_size: 16
num_epochs: 10
lr_base: 1e-4
lr_vit: 1e-5
lr_adapters: 5e-5
weight_decay: 0.05
warmup_epochs: 2
grad_clip: 1.0

# Loss weights
# brain weight starts at 0.05 (5x the brain_eye default) — with per-sample RDMs
# over a batch of 16 we get 120 independent off-diagonal entries per step vs
# the 3 entries of a 3x3 centroid RDM, so a larger coefficient is sensible
# without swamping the main objective. Tune between 0.01 and 0.1.
loss_weights:
  kin: 1.0
  gesture: 1.0
  skill: 0.5
  brain: 0.05
  control: 0.01

# Brain alignment (kinematics-RSA teacher signal)
brain_mode: kinematics_rsa

# Decoder
d_kin_input: 19
d_kin_output: 19
teacher_forcing_decay_epochs: 40

# Other
save_every: 10
