# 27 EEG/Eye simulator task IDs -> simulator-module label used as a nuisance
# regressor during residualization. Nine modules, roughly matching the paper.
# Flagged items marked with comments; edit freely and rerun the pipeline.

modules:
  pick_and_place: [1]                          # 1: Pick and place
  pegboard:       [2, 3]                       # Peg board 1 / 2
  match_board:    [4, 5, 6]                    # Match board 1 / 2 / 3
  ring_and_rail:  [7, 8]                       # Ring and rail 1 / 2
  camera_scaling: [9, 10, 11]                  # Camera targeting 1 / 2, Scaling
  ring_walk:      [12, 13, 14]                 # Ring walk 1 / 2 / 3
  needle_suture:  [15, 16, 17, 18, 19, 20, 21, 22]
  # 15 Needle targeting, 17-19 Suture sponge 1/2/3, 20-21 Dots and needles 1/2.
  # 16 "Thread the rings" -> ambiguous (could be ring_walk / ring_and_rail);
  #    defaulting to needle_suture because threading is the dominant motor skill.
  # 22 "Tubes" -> ambiguous (suturing-on-tubes); defaulting to needle_suture.
  energy:         [23, 24]                     # Energy switching 1 / 2
  dissection:     [25, 26, 27]                 # Energy dissection 1 / 2 / 3

# Human-readable names (from the Phase 1 cache manifest, for reference only).
task_names:
  1:  Pick and place
  2:  Peg board 1
  3:  Peg board 2
  4:  Match board 1
  5:  Match board 2
  6:  Match board 3
  7:  Ring and rail 1
  8:  Ring and rail 2
  9:  Camera targeting 1
  10: Camera targeting 2
  11: Scaling
  12: Ring walk 1
  13: Ring walk 2
  14: Ring walk 3
  15: Needle targeting
  16: Thread the rings
  17: Suture sponge 1
  18: Suture sponge 2
  19: Suture sponge 3
  20: Dots and needles 1
  21: Dots and needles 2
  22: Tubes
  23: Energy switching 1
  24: Energy switching 2
  25: Energy dissection 1
  26: Energy dissection 2
  27: Energy dissection 3
