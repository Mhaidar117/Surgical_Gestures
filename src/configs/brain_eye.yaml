# Brain alignment config (eye-tracking task-centroid RSA)
# Use with: --task all --split fold_1
model_name: vit_small_patch16_224
pretrained: true
freeze_until: 6
use_adapters: true
use_flow: false

# Training
batch_size: 32
num_epochs: 10
lr_base: 1e-4
lr_vit: 1e-5
lr_adapters: 5e-5
weight_decay: 0.05
warmup_epochs: 2
grad_clip: 1.0

# Loss weights
loss_weights:
  kin: 1.0
  gesture: 1.0
  skill: 0.5
  brain: 0.01
  control: 0.01

# Brain alignment (eye-tracking task-centroid RSA)
# Stage 2: Brain alignment fine-tune (use adapters)
brain_mode: eye
training_stage: 2
eye_rdm_path: Eye/Exploration/target_rdm_3x3.npy
brain_layer: mid  # ViT layer for RSA: early, mid, or late

# Decoder
d_kin_input: 19
d_kin_output: 19
teacher_forcing_decay_epochs: 40

# Other
save_every: 10
