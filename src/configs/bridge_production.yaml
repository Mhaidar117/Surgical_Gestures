# Production bridge config: joint EEG+Eye RDM regularizer (Phase 3 joint_eye_eeg_task_family).
# Fixes target_key mismatch in bridge_eeg_rdm.yaml.
# Use: --task all --split fold_1 --data_root . --arm PSM2
#
# brain_mode: bridge
#   Loads target RDM from Phase 3 manifest (joint EEG+eye, task-family level).
#   RSA loss weight = 0.01 (soft regularizer, does not dominate kinematics/gesture).
model_name: vit_small_patch16_224
pretrained: true
freeze_until: 6
use_adapters: true
use_flow: false

batch_size: 32
num_epochs: 10
lr_base: 1e-4
lr_vit: 1e-5
lr_adapters: 5e-5
weight_decay: 0.05
warmup_epochs: 2
grad_clip: 1.0

loss_weights:
  kin: 1.0
  gesture: 1.0
  skill: 0.5
  brain: 0.01
  control: 0.01

brain_mode: bridge
training_stage: 2
brain_layer: mid

bridge:
  manifest_path: cache/eeg_eye_bridge/phase3/rdm_manifest.json
  target_key: joint_eye_eeg_task_family

bridge_grouping: task

d_kin_input: 19
d_kin_output: 19
teacher_forcing_decay_epochs: 40

save_every: 10
