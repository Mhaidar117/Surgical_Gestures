# Stage 3: Joint fine-tune with reduced LR
# Use after Stage 2 (brain alignment) for short joint run
model_name: vit_small_patch16_224
pretrained: true
freeze_until: 6
use_adapters: true
use_flow: false

# Training - reduced LR for joint fine-tune
batch_size: 32
num_epochs: 10
lr_base: 5e-5
lr_vit: 5e-6
lr_adapters: 2.5e-5
weight_decay: 0.05
warmup_epochs: 2
grad_clip: 1.0

# Loss weights
loss_weights:
  kin: 1.0
  gesture: 1.0
  skill: 0.5
  brain: 0.01
  control: 0.01

# Brain alignment
brain_mode: eye
training_stage: 3
eye_rdm_path: Eye/Exploration/target_rdm_3x3.npy

# Decoder
d_kin_input: 19
d_kin_output: 19
teacher_forcing_decay_epochs: 10

# Other
save_every: 5
